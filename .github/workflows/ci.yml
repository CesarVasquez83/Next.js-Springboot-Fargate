name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: demo
          POSTGRES_USER: demo
          POSTGRES_PASSWORD: demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U demo -d demo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            if pg_isready -h localhost -p 5432 -U demo -d demo; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 5
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Build & test backend
        run: mvn -q -DskipTests=false test
        working-directory: .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci
        working-directory: ./demo-frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./demo-frontend

  docker-build:
    
    name: Build and push Docker images to ECR
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configurar credenciales de AWS para este job
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login a ECR (usa las credenciales de arriba)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construir imágenes locales (igual que antes)
      - name: Build backend Docker image (local tag)
        run: docker build -t demo-backend:ci-test .

      - name: Build frontend Docker image (local tag)
        run: docker build -t demo-frontend:ci-test ./demo-frontend

      # Taggear imágenes con los nombres de ECR
      - name: Tag backend image for ECR
        run: |
          docker tag demo-backend:ci-test \
            260256918900.dkr.ecr.us-east-1.amazonaws.com/demo-backend:latest

      - name: Tag frontend image for ECR
        run: |
          docker tag demo-frontend:ci-test \
            260256918900.dkr.ecr.us-east-1.amazonaws.com/demo-frontend:latest

      - name: Push frontend image to ECR
        run: |
          docker push 260256918900.dkr.ecr.us-east-1.amazonaws.com/demo-frontend:latest                      





